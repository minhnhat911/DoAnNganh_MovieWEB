{% extends 'layout/base.html' %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_log.css') }}">
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="register-card">
    <h2 class="register-title">Đăng ký</h2>

    {% if err_msg %}
      <div class="alert alert-error">{{ err_msg }}</div>
    {% endif %}

    <form action="{{ url_for('user.add_user') }}" method="POST" class="register-form" enctype="multipart/form-data">
      <div class="grid-2">
        <div class="field">
          <label for="first-name" class="label">Họ</label>
          <input type="text" id="first-name" name="name" class="input" required>
        </div>
        <div class="field">
          <label for="last-name" class="label">Tên</label>
          <input type="text" id="last-name" name="last-name" class="input" required>
        </div>
      </div>

      <div class="field">
        <label for="username" class="label">Tên tài khoản</label>
        <input type="text" id="username" name="username" class="input" required>
      </div>
      <div class="field">
        <label for="email" class="label">Email</label>
        <input type="email" id="email" name="email" class="input" required>
      </div>

      <div class="grid-2">
        <div class="field">
          <label for="password" class="label">Mật khẩu</label>
          <input type="password" id="password" name="password" class="input" required>
        </div>
        <div class="field">
          <label for="password_confirmation" class="label">Xác nhận mật khẩu</label>
          <input type="password" id="password_confirmation" name="password_confirmation" class="input" required>
        </div>
      </div>

      <div class="field">
        <label for="avatar" class="label">Ảnh đại diện</label>
        <input type="file" class="form-control" id="avatar" name="avatar" />
      </div>

      <button type="submit" class="btn btn-primary">Đăng ký</button>
    </form>

    <div class="helper">
      <a href="{{ url_for('user.auth_user') }}" class="link">Bạn đã có tài khoản? Đăng nhập ngay</a>
    </div>
  </div>
</div>
{% endblock %}
